name: CI

on:
  push:
    branches: [ main, master ]
    tags: [ '*' ]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}

jobs:
  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build sdist
        run: uv build --sdist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          retention-days: 7

  build-wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      # Slowing down the start of jobs slightly helps avoid simultaneous API hits
      max-parallel: 3
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # This step fixes the 429 error by providing virtualenv via PyPI/uv cache
      # instead of letting cibuildwheel download it from GitHub raw URLs.
      - name: Pre-install virtualenv
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            pip install --upgrade virtualenv
          else
            python3 -m pip install --user --break-system-packages --upgrade virtualenv
          fi
        shell: bash

      - name: Set up QEMU
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.22
        env:
          CIBW_BUILD: cp310-* cp311-* cp312-* cp313-* cp314-*
          CIBW_ARCHS_LINUX: auto aarch64
          CIBW_ARCHS_MACOS: x86_64 arm64
          CIBW_ARCHS_WINDOWS: auto
          CIBW_SKIP: "*-musllinux* *i686 *win32"

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl
          retention-days: 7

  test:
    needs: build-wheels
    name: Test on ${{ matrix.os }} with Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download wheels for this OS
        uses: actions/download-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist/

      - name: Run Unit Tests
        shell: bash
        run: |
          uv sync --locked --dev --all-extras
          uv pip install hopsy --find-links dist/ --no-index
          uv run python -m unittest -v tests

  integration-test:
    needs: build-wheels
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Download Ubuntu wheels
        uses: actions/download-artifact@v4
        with:
          name: wheels-ubuntu-latest
          path: dist/

      - name: Run Integration Tests
        run: |
          curl https://clickhouse.com/ | sh
          ./clickhouse server &> clickhouse.log &
          sleep 5

          uv sync --locked --dev --all-extras --group integration-tests
          uv pip install --prerelease=allow mcbackend
          uv pip install hopsy --find-links dist/ --no-index

          for f in examples/*.py; do uv run python $f || exit 1; done
          for f in examples/*.ipynb; do uv run python -m jupyter nbconvert --to notebook --execute $f || exit 1; done

  build-docs:
    needs: build-wheels
    name: Build Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install System Dependencies
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Download Ubuntu wheels
        uses: actions/download-artifact@v4
        with:
          name: wheels-ubuntu-latest
          path: dist/

      - name: Build Docs
        run: |
          uv sync --locked --dev --all-extras
          uv pip install hopsy --find-links dist/ --no-index

          mkdir new-docs
          uv run sphinx-build -b html docs-sources new-docs
          uv run docov hopsy --output new-docs/

      - name: Upload Docs Artifact
        uses: actions/upload-artifact@v4
        with:
          name: new-docs
          path: new-docs/
          retention-days: 7
