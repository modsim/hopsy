.python_versions: &python_versions
  PYTHON_VERSION: ["3.10", "3.11", "3.12", "3.13", "3.14"]

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS'
      when: never
    - if: '$CI_COMMIT_BRANCH'
    - if: '$CI_COMMIT_TAG'

image: quay.io/pypa/manylinux_2_28_x86_64

variables:
  GIT_STRATEGY: clone
  GIT_DEPTH: 0  # CRITICAL: Needed so setuptools_scm can see tags/history
  GIT_SUBMODULE_STRATEGY: recursive # Fetch hops
  UV_CACHE_DIR: ".uv-cache"

stages:
  - build
  - test
  - upload-artifacts

pre-commit:
  image: python:3.14
  stage: build
  cache:
    paths:
      - .uv-cache
      - "${CI_PROJECT_DIR}/.pre-commit-cache"
  script:
    - python -m pip install uv
    - uv tool run pre-commit run --all-files

build-debug:
  stage: build
  script:
    - /opt/python/cp314-cp314/bin/pip install uv
    - uv venv
    - source .venv/bin/activate
    # Build a debug wheel. We pass 'Debug' to CMake via scikit-build-core configuration
    - uv build --wheel --python 3.14 -Ccmake.build-type=Debug
    - auditwheel repair dist/hopsy-*.whl -w dist/
  artifacts:
    paths:
      - dist/*manylinux*
    expire_in: 7 days

build-release:
  stage: build
  parallel:
    matrix:
      - *python_versions
  script:
    - PY_VER_CLEAN=$(echo $PYTHON_VERSION | tr -d '.')
    - PY_PATH="/opt/python/cp${PY_VER_CLEAN}-cp${PY_VER_CLEAN}/bin"
    - $PY_PATH/pip install uv
    - uv venv
    - source .venv/bin/activate
    - uv build --wheel --python $PYTHON_VERSION
    - auditwheel repair dist/hopsy-*.whl -w dist/
  artifacts:
    paths:
      - dist/*manylinux*
    expire_in: 7 days

build-release-macos:
  stage: build
  tags:
    - macos
  parallel:
    matrix:
      - *python_versions
  before_script:
    - brew install uv || true
  script:
    - uv venv
    - source .venv/bin/activate
    - uv build --wheel --python $PYTHON_VERSION
    - pip install delocate
    - delocate-wheel -v dist/hopsy-*.whl
  artifacts:
    paths:
      - dist/*.whl
    expire_in: 7 days

test-debug:
  stage: test
  dependencies:
    - build-debug
  script:
    - PYTHON_VERSION=3.14
    - PY_VER_CLEAN=$(echo $PYTHON_VERSION | tr -d '.')
    - PY_PATH="/opt/python/cp${PY_VER_CLEAN}-cp${PY_VER_CLEAN}/bin"
    - $PY_PATH/pip install uv
    - uv venv --python $PYTHON_VERSION
    - source .venv/bin/activate
    - uv pip install hopsy --no-index --find-links dist/
    - uv pip install docov
    - python -m unittest -v tests

test-release:
  stage: test
  dependencies:
    - build-release
  parallel:
    matrix:
      - *python_versions
  script:
    - PY_VER_CLEAN=$(echo $PYTHON_VERSION | tr -d '.')
    - PY_PATH="/opt/python/cp${PY_VER_CLEAN}-cp${PY_VER_CLEAN}/bin"
    - $PY_PATH/pip install uv
    - uv venv --python $PYTHON_VERSION
    - source .venv/bin/activate
    - uv pip install hopsy --no-index --find-links dist/
    - uv pip install docov
    - python -m unittest -v tests

test-release-macos:
  stage: test
  tags:
    - macos
  dependencies:
    - build-release-macos
  parallel:
    matrix:
      - *python_versions
  before_script:
    - brew install uv || true
  script:
    - uv venv --python $PYTHON_VERSION
    - source .venv/bin/activate
    - uv build --wheel --python $PYTHON_VERSION
    - uv pip install hopsy --no-index --find-links dist/
    - uv pip install docov
    - python -m unittest -v tests

test-integration-release:
  stage: test
  dependencies:
    - build-release
  script:
    - PYTHON_VERSION=3.14
    - PY_VER_CLEAN=$(echo $PYTHON_VERSION | tr -d '.')
    - PY_PATH="/opt/python/cp${PY_VER_CLEAN}-cp${PY_VER_CLEAN}/bin"
    - $PY_PATH/pip install uv
    - uv venv --python $PYTHON_VERSION
    - source .venv/bin/activate
    - uv pip install hopsy --no-index --find-links dist/
    - uv pip install --prerelease=allow docov jupyter nbconvert clickhouse-driver hagelkorn mcbackend ipyparallel 'polyround[extras]'
    - curl https://clickhouse.com/ | sh
    - ./clickhouse server &> clickhouse.log &
    - sleep 5
    - for f in examples/*.py; do python $f || exit 1; done
    - for f in examples/*.ipynb; do python -m jupyter nbconvert --to notebook --execute $f || exit 1; done
  after_script:
    - pkill clickhouse || true

build-docs:
  stage: test
  image: ubuntu:24.04
  dependencies:
    - build-release
  script:
    - apt update && apt install -y python3-dev pandoc python3-pip curl
    - curl -LsSf https://astral.sh/uv/install.sh | sh
    - source $HOME/.local/bin/env
    - uv venv
    - source .venv/bin/activate
    - uv pip install sphinx pybind11 numpy pandas matplotlib sphinx-rtd-theme nbsphinx pydata_sphinx_theme ipython docov
    - uv pip install hopsy --no-index --find-links dist/
    - mkdir new-docs
    - sphinx-build -b html docs-sources new-docs
    - docov hopsy --output new-docs/
  artifacts:
    paths:
      - new-docs

upload-docs:
  stage: upload-artifacts
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_COMMIT_AUTHOR !~ /^CI_BOT/'
  dependencies:
    - build-docs
  script:
    - git config user.email $GITLAB_USER_EMAIL
    - git config user.name "CI_BOT"
    - git remote remove origin
    - git remote add origin https://oauth2:${CI_BOT}@jugit.fz-juelich.de/IBG-1/ModSim/hopsy.git
    - echo "Author is ${CI_COMMIT_AUTHOR}"
    - git rm docs -rf # remove old docs so no stales files remain
    - mv new-docs docs
    - git add docs
    - git commit --no-verify --allow-empty -m "automatically add docs for ${CI_COMMIT_MESSAGE}"
    - git push origin HEAD:$CI_COMMIT_BRANCH
